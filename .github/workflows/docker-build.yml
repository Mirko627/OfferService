# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Docker

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish_docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2. Setup .NET (IMPORTANTE per restore in Docker build)
      # =========================
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # =========================
      # 3. NuGet auth (IDEMPOTENTE FIX)
      # =========================
      - name: Setup NuGet source (GitHub Packages)
        run: |
          dotnet nuget remove source github || true

          dotnet nuget add source https://nuget.pkg.github.com/Mirko627/index.json \
            --name github \
            --username ${{ secrets.MIRKO_NUGET_USERNAME }} \
            --password ${{ secrets.MIRKO_NUGET_PWD }} \
            --store-password-in-clear-text

      # =========================
      # 4. Login GHCR
      # =========================
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # 5. Metadata immagini
      # =========================
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # =========================
      # 6. Build & Push Docker
      # =========================
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: OfferService.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
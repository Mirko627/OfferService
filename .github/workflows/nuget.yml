name: NuGet

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          source-url: https://nuget.pkg.github.com/Mirko627/index.json

      - name: Restore
        run: dotnet restore OfferService.sln

      - name: Build
        run: dotnet build OfferService.sln --configuration Release --no-restore

      - name: Pack
        run: dotnet pack OfferService.sln --configuration Release --no-build

      - name: Push packages to GitHub Packages
        run: |
          dotnet nuget push "**/bin/Release/*.nupkg" \
            --source "https://nuget.pkg.github.com/Mirko627/index.json" \
            --skip-duplicate